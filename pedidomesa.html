<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Pizza | Pedido Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="pagina-pedido">

    <header class="navbar">
        <div class="logo"><h1>Bella Pizza 🍕</h1></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Cardápio</a></li> 
                <li><a href="pedidomesa.html" class="active">Fazer Pedido</a></li>
                <li><a href="reservas.html">Reservas</a></li>
                <li><a href="contatos.html">Contactos</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div style="text-align: center; margin: 20px 0;">
            <button type="button" class="btn-garcom" onclick="abrirMensagem()">🔔 Chamar Garçom</button>
        </div>

        <div id="caixa-aviso" class="modal-sobreposicao" style="display:none;">
            <div class="cartao-aviso">
                <div class="pizza-animada">🍕</div>
                <h2 id="titulo-aviso">Mamma Mia!</h2>
                <p id="texto-engracado"></p>
                <button onclick="fecharMensagem()" class="btn-entendido">Entendido!</button>
            </div>
        </div>

        <section class="card-pedido">
            <h3>1. Identificação</h3>
            <label for="mesa">Sua Mesa:</label>
            <select id="mesa">
                <option value="" disabled selected>Escolha a mesa...</option>
                <option value="01">Mesa 01</option>
                <option value="02">Mesa 02</option>
                <option value="03">Mesa 03</option>
                </select>
        </section>

        <section class="card-pedido">
            <h3>2. Adicionar Itens</h3>
            <div class="grid-inputs">
                <div>
                    <label>Pizza/Massa:</label>
                    <select id="item-comida">
                        <option value="Nenhum">Selecione...</option>
                        <option value="Pizza Margherita">Margherita - €12,50</option>
                        <option value="Pizza Pepperoni">Pepperoni - €14,90</option>
                        <option value="Lasanha">Lasanha - €13,00</option>
                    </select>
                </div>
                <div>
                    <label>Bebida:</label>
                    <select id="item-bebida">
                        <option value="Nenhum">Selecione...</option>
                        <option value="Água Fresca">Água - €1,50</option>
                        <option value="Coca-Cola">Coca-Cola - €1,80</option>
                        <option value="Vinho Casa">Vinho - €18,00</option>
                    </select>
                </div>
            </div>
            <button type="button" class="btn-secundario" onclick="adicionarAoCarrinho()" style="margin-top: 15px; width: 100%; background: #e67e22;">
                ➕ Adicionar ao Pedido
            </button>
        </section>

        <section class="card-pedido" id="area-carrinho" style="display:none;">
            <h3>🛒 Itens na Mesa</h3>
            <ul id="lista-carrinho"></ul>
            <hr>
            <button type="button" class="btn-finalizar" onclick="mostrarPagamento()">
                🏁 Fechar Pedido / Pagar
            </button>
        </section>

        <section class="card-pedido" id="secao-pagamento" style="display:none; background: #fdf2e9; border: 2px solid #e67e22;">
            <h3>💳 Finalizar Conta</h3>
            <p>Como deseja pagar?</p>
            <div class="opcoes-pagamento">
                <input type="radio" name="pagamento" value="MB WAY" id="pay1" checked> <label for="pay1">MB WAY</label><br>
                <input type="radio" name="pagamento" value="Cartão" id="pay2"> <label for="pay2">Cartão</label><br>
                <input type="radio" name="pagamento" value="Dinheiro" id="pay3"> <label for="pay3">Dinheiro</label>
            </div>
            <button type="button" class="btn-finalizar" onclick="enviarWhatsAppFinal()" style="margin-top: 15px;">
                ✅ Enviar Pedido para Cozinha
            </button>
        </section>

    </main>

    <footer id="contacto">
        <div class="copyright">
            <p>&copy; 2026 Bella Pizza - Formador João Pedro</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
